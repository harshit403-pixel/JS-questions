<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main>
        <div class="addtoaster">
           <h4>Item added</h4>
        </div>
        <nav>
            <h1 id="home-btn">ZAPPY</h1>
            <button id="cart-btn">My Cart</button>
        </nav>

        <div class="cart">
                    </div>

        <form class="add-item-form">
            <input name="item-name" type="text" placeholder="Name">
            <input type="url" placeholder="image url"> 
            <select name="item-category">
                <option disabled selected>Category</option>
                <option value="fruites">fruites</option>
                <option value="vegeies">vegeies</option>
                <option value="sancks">sancks</option>
                <option value="bakery">bakery</option>
                <option value="dairy">dairy</option>
                <option value="beverages">beverages</option>
            </select>
            <input name="item-quatity" type="text" placeholder="Qauntity">
            <input name="item-price" type="number" placeholder="Price">
            <input name="item-expiry" type="text" placeholder="Expiry">
            <button>Submit</button>

        </form>

        <div class="item-cards">
            </div>


    </main>
    <script src="script.js"></script>
</body>
</html>
